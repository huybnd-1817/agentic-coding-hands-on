name: iOS Tests

on:
  push:
    branches: [main, feature_login]
  pull_request:

jobs:
  test:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      # Pin Xcode to a major version so a runner image update cannot silently
      # change the toolchain. `setup-xcode` resolves the latest 16.x available
      # on the runner — explicit, robust, and fails fast if not found.
      - name: Select Xcode 16
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16'

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Run tests with coverage
        run: |
          xcodebuild test \
            -scheme saa \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -enableCodeCoverage YES \
            -resultBundlePath ./saa-tests.xcresult

      - name: Coverage report
        if: always()
        run: xcrun xccov view --report ./saa-tests.xcresult

      - name: Upload xcresult on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: saa-tests-xcresult
          path: ./saa-tests.xcresult
          retention-days: 7
